<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="4" fill="#38bdf8"/>

  <!-- Pixel art >_ logo -->
  <g fill="#38bdf8" transform="translate(80, 80) scale(3)">
    <rect x="4" y="8" width="2" height="2"/>
    <rect x="6" y="10" width="2" height="2"/>
    <rect x="8" y="12" width="2" height="2"/>
    <rect x="10" y="14" width="2" height="2"/>
    <rect x="8" y="16" width="2" height="2"/>
    <rect x="6" y="18" width="2" height="2"/>
    <rect x="4" y="20" width="2" height="2"/>
    <rect x="16" y="20" width="2" height="2"/>
    <rect x="18" y="20" width="2" height="2"/>
    <rect x="20" y="20" width="2" height="2"/>
    <rect x="22" y="20" width="2" height="2"/>
    <rect x="24" y="20" width="2" height="2"/>
  </g>

  <!-- Name -->
  <text x="80" y="280" font-family="'JetBrains Mono', monospace" font-size="64" font-weight="700" fill="#ffffff">Johnson Li</text>

  <!-- Title -->
  <text x="80" y="340" font-family="'JetBrains Mono', monospace" font-size="24" fill="#38bdf8">Sr. Staff Engineer &amp; Bar Raiser @ Coupang</text>

  <!-- Tagline -->
  <text x="80" y="420" font-family="'JetBrains Mono', monospace" font-size="28" fill="#94a3b8">When Execution becomes cheap,</text>
  <text x="80" y="460" font-family="'JetBrains Mono', monospace" font-size="28" fill="#94a3b8">Judgment is the moat.</text>

  <!-- URL -->
  <text x="80" y="570" font-family="'JetBrains Mono', monospace" font-size="20" fill="#475569">about.johnsonlee.io</text>

  <!-- Decorative dots -->
  <circle cx="1100" cy="100" r="60" fill="#38bdf8" opacity="0.05"/>
  <circle cx="1050" cy="200" r="100" fill="#38bdf8" opacity="0.03"/>
</svg>
